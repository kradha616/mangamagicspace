<!DOCTYPE html>
<html>
<head>
    <title>MangaMagicSpace</title>

</head>

<body>

<div class="navbar">
   <div class="logo">
    <a href="index.html">MangaMagicSpace</a>
</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="login.html">Login</a>
        <a href="history.html">History</a>
    </div>
</div>

<div class="hero">
    <h1>Read. Upload. Explore Manga.</h1>
    <p>Your ultimate manga reading experience.</p>
</div>
    <div class="manga-grid">

<div class="manga-card">
<a href="reader.html?manga=naruto&chapter=chapter-1">
    <div class="image-container">
        <img src="manga/naruto/cover.jpeg">
        <div class="overlay"></div>
        <div class="title">Naruto</div>
        <div class="badge">NEW</div>
    </div>
</a>
</div>

   <div class="manga-card">
<a href="reader.html?manga=one-piece&chapter=chapter-1">
    <div class="image-container">
        <img src="manga/one-piece/cover.jpeg">
        <div class="overlay"></div>
        <div class="title">One Piece</div>
        <div class="badge">NEW</div>
    </div>
</a>
</div>

   <div class="manga-card">
    <a href="reader.html?manga=attack-on-titan&chapter=chapter-1">
        <div class="image-container">
            <img src="manga/attack-on-titan/cover.jpeg">
            <div class="overlay"></div>
            <div class="title">Attack on Titan</div>
            <div class="badge">NEW</div>
        </div>
    </a>
</div>
        
    <div class="manga-card">
    <a href="reader.html?manga=jujutsu-kaisen&chapter=chapter-1">
        <div class="image-container">
        <img src="manga/jujutsu-kaisen/chapter-1/1.jpeg">
            <div class="overlay"></div>
            <div class="title">Jujutsu Kaisen</div>
            <div class="badge">NEW</div>
        </div>
    </a>
</div>
        </div>
<script>
const cards = document.querySelectorAll(".manga-card");

cards.forEach(card => {

    // 🔥 Parallax Tilt Effect
    card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = -(y - centerY) / 20;
        const rotateY = (x - centerX) / 20;

        card.style.transform = `
            perspective(1000px)
            rotateX(${rotateX}deg)
            rotateY(${rotateY}deg)
            translateY(-8px)
        `;
    });

    card.addEventListener("mouseleave", () => {
        card.style.transform = "perspective(1000px) rotateX(0) rotateY(0)";
    });

    // 💥 Ripple Click Effect
    card.addEventListener("click", function (e) {
        const circle = document.createElement("span");
        circle.classList.add("ripple");

        const rect = card.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);

        circle.style.width = circle.style.height = size + "px";
        circle.style.left = e.clientX - rect.left - size / 2 + "px";
        circle.style.top = e.clientY - rect.top - size / 2 + "px";

        card.appendChild(circle);

        setTimeout(() => circle.remove(), 600);
    });

});
    
</script>
</body>
</html>
