<!DOCTYPE html>
<html>
<head>
    <title>MangaMagicSpace</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
   <div class="logo">
    <a href="index.html">MangaMagicSpace</a>
</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="login.html">Login</a>
        <a href="history.html">History</a>
    </div>
</div>

<div class="hero">
    <h1>Read. Upload. Explore Manga.</h1>
    <p>Your ultimate manga reading experience.</p>
</div>

<div class="manga-grid">
    <div class="manga-card">
        <img src="https://via.placeholder.com/200x300">
        <h3>Naruto</h3>
    </div>

    <div class="manga-card">
        <img src="https://via.placeholder.com/200x300">
        <h3>One Piece</h3>
    </div>

   <div class="manga-card">
    <a href="reader.html?manga=attack-on-titan&chapter=chapter-1">
        <div class="image-container">
            <img src="manga/attack-on-titan/cover.jpeg">
            <div class="overlay"></div>
            <div class="title">Attack on Titan</div>
            <div class="badge">NEW</div>
        </div>
    </a>
</div>
    <div class="manga-card">
    <a href="reader.html?manga=jujutsu-kaisen&chapter=chapter-1">
        <div class="image-container">
        <img src="manga/jujutsu-kaisen/chapter-1/1.jpeg">
            <div class="overlay"></div>
            <div class="title">Jujutsu Kaisen</div>
            <div class="badge">NEW</div>
        </div>
    </a>
</div>
</div>
<script>
const cards = document.querySelectorAll(".manga-card");

cards.forEach(card => {
    card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = -(y - centerY) / 20;
        const rotateY = (x - centerX) / 20;

        card.style.transform = `
            perspective(1000px)
            rotateX(${rotateX}deg)
            rotateY(${rotateY}deg)
            translateY(-8px)
        `;
    });

    card.addEventListener("mouseleave", () => {
        card.style.transform = "perspective(1000px) rotateX(0) rotateY(0)";
    });
});
</script>
</body>
</html>
