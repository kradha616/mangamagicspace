<!DOCTYPE html>
<html>
<head>
    <title>Manga Reader</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            margin: 0;
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #1e293b;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #f97316;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .reader-container {
            text-align: center;
            padding: 20px;
        }

        .reader-container img {
            max-width: 90%;
            height: auto;
            border-radius: 10px;
            transition: opacity 0.3s ease-in-out;
        }
        .bottom-navigation {
    margin: 40px 0;
    text-align: center;
}

.bottom-navigation button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 15px;
    cursor: pointer;
    background-color: #f97316;
    border: none;
    border-radius: 5px;
    color: white;
}

.bottom-navigation button:hover {
    opacity: 0.85;
}

        .controls {
            margin-top: 15px;
            transition: opacity 0.5s ease;
        }

        .controls button, select {
            padding: 8px 15px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
            background-color: #f97316;
            border: none;
            border-radius: 5px;
            color: white;
        }

        .page-info {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }

        .hidden {
            opacity: 0;
        }

        .vertical-mode img {
            display: block;
            margin: 20px auto;
            max-width: 800px;
        }
        .logo {
    text-decoration: none;
    color: #f97316;
}

.logo:hover {
    opacity: 0.8;
}
    </style>
</head>
<body>

<header>
    <h1><a href="index.html" class="logo">MangaMagicSpace</a></h1>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<div class="reader-container" id="readerContainer">

    <h2>Jujutsu Kaisen - Chapter 1</h2>

    
    <br><br>

    <img id="mangaImage">

    <div class="controls" id="controls">
        <button onclick="prevPage()">⬅ Previous</button>
        <button onclick="nextPage()">Next ➡</button>
        <button onclick="toggleVertical()">Toggle Vertical Mode</button>
        <select id="chapterSelect"></select>
    </div>

    <div class="page-info" id="pageInfo"></div>

</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const manga = urlParams.get("manga") || "jujutsu-kaisen";
const chapter = urlParams.get("chapter") || "chapter-1";

/* ✅ PAGE COUNTS GO HERE */
const pageCounts = {
    "chapter-1": 53,
    "chapter-2": 25
};

let totalPages = pageCounts[chapter];

if (!totalPages) {
    totalPages = 1;
}

let currentPage = 1;
let verticalMode = false;

const imageElement = document.getElementById("mangaImage");
const pageInfo = document.getElementById("pageInfo");
const controls = document.getElementById("controls");
const readerContainer = document.getElementById("readerContainer");

function updateImage() {
    imageElement.style.opacity = 0;

    setTimeout(() => {
        imageElement.src = `manga/${manga}/${chapter}/${currentPage}.jpeg`;
        pageInfo.textContent = `Page ${currentPage} / ${totalPages}`;
        imageElement.style.opacity = 1;
    }, 150);
}

function nextPage() {
    if (currentPage < totalPages) {
        currentPage++;
        updateImage();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        updateImage();
    }
}

function toggleVertical() {
    verticalMode = !verticalMode;

    if (verticalMode) {
        imageElement.style.display = "none";
        pageInfo.textContent = "";
        loadAllPages();
    } else {
        removeVerticalPages();
        imageElement.style.display = "block";
        updateImage();
    }
}

function loadAllPages() {
    removeVerticalPages();

    for (let i = 1; i <= totalPages; i++) {
        const img = document.createElement("img");
        img.src = `manga/${manga}/${chapter}/${i}.jpeg`;
        img.classList.add("vertical-page");
        img.style.display = "block";
        img.style.margin = "20px auto";
        img.style.maxWidth = "800px";

        readerContainer.appendChild(img);
    }

    // Bottom navigation in vertical mode
    const bottomNav = document.createElement("div");
    bottomNav.classList.add("bottom-navigation");

    bottomNav.innerHTML = `
        <button onclick="prevPage()">⬅ Previous</button>
        <button onclick="nextPage()">Next ➡</button>
    `;

    readerContainer.appendChild(bottomNav);
}

function removeVerticalPages() {
    const allImages = document.querySelectorAll(".vertical-page");
    allImages.forEach(img => img.remove());

    const bottomNav = document.querySelector(".bottom-navigation");
    if (bottomNav) bottomNav.remove();
}

function populateChapters(totalChapters) {
    const select = document.getElementById("chapterSelect");
    select.innerHTML = "";

    for (let i = 1; i <= totalChapters; i++) {
        let option = document.createElement("option");
        option.value = "chapter-" + i;
        option.textContent = "Chapter " + i;

        if (option.value === chapter) {
            option.selected = true;
        }

        select.appendChild(option);
    }
}

populateChapters(5);

document.getElementById("chapterSelect").addEventListener("change", function () {
    window.location.href = `reader.html?manga=${manga}&chapter=${this.value}`;
});

updateImage();
</script>

</body>
</html>
