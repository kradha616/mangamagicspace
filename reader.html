<!DOCTYPE html>
<html>
<head>
    <title>Manga Reader</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .reader-container {
            text-align: center;
            padding: 20px;
        }

        .reader-container img {
            max-width: 90%;
            height: auto;
            border-radius: 10px;
        }

        .controls {
            margin-top: 20px;
        }

        .controls button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            background-color: #f97316;
            border: none;
            border-radius: 5px;
            color: white;
        }

        .controls button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<header>
    <h1>MangaMagicSpace</h1>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<div class="reader-container">
    <h2>Jujutsu Kaisen - Chapter 1</h2>

    <img id="mangaImage" src="manga/jujutsu-kaisen/chapter-1/1.jpeg">

    <div class="controls">
        <button onclick="prevPage()">Previous</button>
        <button onclick="nextPage()">Next</button>
    </div>
</div>

<script>
    let currentPage = 1;
    const totalPages = 53; // change if needed

    function updateImage() {
        document.getElementById("mangaImage").src =
            `manga/jujutsu-kaisen/chapter-1/${currentPage}.jpeg`;
    }

    function nextPage() {
        if (currentPage < totalPages) {
            currentPage++;
            updateImage();
        }
    }

    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            updateImage();
        }
    }
</script>

</body>
</html>
