<!DOCTYPE html>
<html>
<head>
    <title>Manga Reader</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            margin: 0;
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #1e293b;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #f97316;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .reader-container {
            text-align: center;
            padding: 20px;
        }

        .reader-container img {
            max-width: 90%;
            height: auto;
            border-radius: 10px;
            transition: opacity 0.3s ease-in-out;
        }

        .controls {
            margin-top: 15px;
            transition: opacity 0.5s ease;
        }

        .controls button, select {
            padding: 8px 15px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
            background-color: #f97316;
            border: none;
            border-radius: 5px;
            color: white;
        }

        .page-info {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }

        .hidden {
            opacity: 0;
        }

        .vertical-mode img {
            display: block;
            margin: 20px auto;
            max-width: 800px;
        }
    </style>
</head>
<body>

<header>
    <h1>
    <a href="index.html" style="text-decoration: none; color: #f97316;">
        MangaMagicSpace
    </a>
</h1>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<div class="reader-container" id="readerContainer">

    <h2>Jujutsu Kaisen - Chapter 1</h2>

    <select id="chapterSelect">
        <option value="chapter-1">Chapter 1</option>
    </select>

    <br><br>

    <img id="mangaImage">

    <div class="controls" id="controls">
        <button onclick="prevPage()">⬅ Previous</button>
        <button onclick="nextPage()">Next ➡</button>
        <button onclick="toggleVertical()">Toggle Vertical Mode</button>
    </div>

    <div class="page-info" id="pageInfo"></div>

</div>

<script>
    let currentPage = 1;
    let totalPages = 53;
    let verticalMode = false;
    const chapter = "chapter-1";

    const imageElement = document.getElementById("mangaImage");
    const pageInfo = document.getElementById("pageInfo");
    const controls = document.getElementById("controls");
    const readerContainer = document.getElementById("readerContainer");

    function updateImage() {
        imageElement.style.opacity = 0;

        setTimeout(() => {
            imageElement.src =
                `manga/jujutsu-kaisen/${chapter}/${currentPage}.jpeg`;

            pageInfo.textContent = `Page ${currentPage} / ${totalPages}`;
            imageElement.style.opacity = 1;
        }, 150);
    }

    function nextPage() {
        if (currentPage < totalPages) {
            currentPage++;
            updateImage();
        }
    }

    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            updateImage();
        }
    }

    function toggleVertical() {
        verticalMode = !verticalMode;

        if (verticalMode) {
            readerContainer.classList.add("vertical-mode");
            loadAllPages();
        } else {
            readerContainer.classList.remove("vertical-mode");
            imageElement.style.display = "block";
            updateImage();
        }
    }

    function loadAllPages() {
        readerContainer.innerHTML = "<h2>Jujutsu Kaisen - Chapter 1</h2>";

        for (let i = 1; i <= totalPages; i++) {
            const img = document.createElement("img");
            img.src = `manga/jujutsu-kaisen/${chapter}/${i}.jpeg`;
            readerContainer.appendChild(img);
        }
    }

    document.addEventListener("keydown", function (e) {
        if (!verticalMode) {
            if (e.key === "ArrowRight") nextPage();
            if (e.key === "ArrowLeft") prevPage();
        }
    });

    let hideTimeout;

    document.addEventListener("mousemove", function () {
        controls.classList.remove("hidden");

        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => {
            controls.classList.add("hidden");
        }, 2000);
    });

    updateImage();
</script>

</body>
</html>
