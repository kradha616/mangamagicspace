<!DOCTYPE html>
<html>
<head>
    <title>Reader - MangaMagicSpace</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }

        button {
            padding: 10px 20px;
            margin-top: 20px;
            background-color: #f97316;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1 id="mangaTitle"></h1>
<p>This is a prototype manga reader page.</p>

<button onclick="goBack()">Back to Home</button>

<script>
const manga = localStorage.getItem("currentManga");

if(!manga) {
    window.location.href = "index.html";
}

document.getElementById("mangaTitle").innerText = manga;

function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
