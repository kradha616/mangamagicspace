<!DOCTYPE html>
<html>
<head>
    <title>History - MangaMagicSpace</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f1b2d;
            color: white;
            text-align: center;
        }

        nav {
            background-color: #1f2d40;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            color: orange;
            margin: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .history-container {
            margin-top: 50px;
        }

        .history-card {
            background-color: #1f2d40;
            margin: 15px auto;
            padding: 15px;
            width: 300px;
            border-radius: 8px;
            cursor: pointer;
        }

        .history-card:hover {
            background-color: #2f4058;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: orange;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<nav>
    <h1>MangaMagicSpace</h1>
    <div>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
    </div>
</nav>

<h2>Your Reading History</h2>

<div class="history-container"></div>

<script>
const container = document.querySelector(".history-container");
const history = JSON.parse(localStorage.getItem("history")) || [];

if(history.length === 0) {
    container.innerHTML = "<p>No manga read yet.</p>";
} else {
    history.forEach((title) => {
        const div = document.createElement("div");
        div.className = "history-card";
        div.innerText = title;

        div.onclick = function() {
            localStorage.setItem("currentManga", title);
            window.location.href = "reader.html";
        };

        container.appendChild(div);
    });
}
</script>

</body>
</html>
